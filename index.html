<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chuí → Montevidéu · Caderno de Expedição</title>
<meta name="description" content="Equipamento, treino e rota para o cicloturismo Chuí–Montevidéu. Funciona offline.">
<meta name="theme-color" content="#12332e">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./icon-192.png">
<style>
:root{--ink:#153e37;--ink2:#0f3a34;--sand:#e7e0cf;--paper:#f8f4ea;--paper2:#fffdf7;--accent:#d97514;--accent2:#b85f0d;--ok:#3a7a5c;--text:#22271e;--muted:#726a58;--warn:#b26a00;--danger:#b23a2e;--water:#2c6f8c;--line:#d9d0ba;}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--sand);}
body{font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;color:var(--text);}
.wrap{max-width:860px;margin:0 auto;min-height:100vh;background:var(--sand);}
.mono{font-family:ui-monospace,'SF Mono','Cascadia Code',Menlo,Consolas,monospace;}
.loading{padding:60px 24px;text-align:center;color:var(--muted);font-style:italic;}

/* brand + tabs */
.brand{position:relative;background:linear-gradient(160deg,#1b463f,#12332e);color:#f3efe2;overflow:hidden;padding:20px 24px 16px;}
.contours{position:absolute;inset:0;width:100%;height:100%;}
.brand-in{position:relative;}
.eyebrow{font-family:ui-monospace,monospace;font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:#c9b78a;margin-bottom:6px;}
.brand h1{margin:0;font-size:27px;font-weight:800;letter-spacing:-.02em;line-height:1;}
.brand h1 .arrow{color:var(--accent);font-weight:400;padding:0 4px;}
.brand .sub{margin:7px 0 0;color:#b9c4bd;font-size:12.5px;}
.offline-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-family:ui-monospace,monospace;letter-spacing:.05em;color:#8fa89f;text-transform:uppercase;margin-top:10px;}
.dot{width:6px;height:6px;border-radius:50%;background:#4f7a6b;}
.tabs{position:sticky;top:0;z-index:20;display:flex;background:var(--ink2);border-bottom:1px solid #0a2a25;}
.tab{flex:1;border:none;background:none;color:#9fb7ae;padding:13px 8px;font-size:13px;font-family:inherit;cursor:pointer;font-weight:600;letter-spacing:.01em;border-bottom:2.5px solid transparent;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px;}
.tab:hover{color:#e6efe9;}
.tab.on{color:#fff;border-bottom-color:var(--accent);background:rgba(217,117,20,.08);}

.view-hero{padding:18px 20px 8px;}
.view-hero h2{margin:0;font-size:18px;font-weight:750;letter-spacing:-.01em;}
.view-hero p{margin:5px 0 0;font-size:13px;color:var(--muted);line-height:1.5;}

/* progress bar generic */
.prog{height:6px;background:#d8cfb8;border-radius:4px;overflow:hidden;margin-top:10px;}
.prog > i{display:block;height:100%;background:var(--accent);border-radius:4px;transition:width .5s cubic-bezier(.4,0,.2,1);}

/* ===== GEAR ===== */
.route{margin:16px 20px 4px;}
.route-labels{display:flex;justify-content:space-between;font-size:11px;letter-spacing:.05em;color:var(--muted);margin-bottom:7px;text-transform:uppercase;}
.route-track{position:relative;height:4px;background:#d3caB3;background:#d6cdb6;border-radius:3px;margin:10px 6px;}
.route-fill{position:absolute;left:0;top:0;height:100%;background:var(--accent);border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1);}
.wp{position:absolute;top:50%;width:7px;height:7px;margin:-3.5px 0 0 -3.5px;border-radius:50%;background:#c2b998;border:1px solid #a99f7d;transition:background .3s;}
.wp.on{background:var(--accent);border-color:var(--accent2);}
.rider{position:absolute;top:50%;width:14px;height:14px;margin:-7px 0 0 -7px;border-radius:50%;background:#fff;border:3px solid var(--accent);box-shadow:0 2px 6px rgba(0,0,0,.25);transition:left .5s cubic-bezier(.4,0,.2,1);}
.route-status{font-size:12.5px;color:var(--text);margin-top:12px;}
.route-status b{color:var(--ink);}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);border-top:1px solid var(--line);border-bottom:1px solid var(--line);margin-top:14px;}
.stat{background:var(--paper);padding:14px 16px;display:flex;flex-direction:column;gap:4px;}
.stat-k{font-size:11px;color:var(--muted);}
.stat-v{font-family:ui-monospace,monospace;font-size:21px;font-weight:700;letter-spacing:-.02em;}
.stat-v.accent{color:var(--accent2);}
.stat-v.ok{color:var(--ok);}
.stat-v .frac{font-size:14px;color:var(--muted);font-weight:500;}

.months{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;padding:14px 16px 4px;}
.mo{background:var(--paper);border:1px solid var(--line);border-radius:9px;padding:9px 6px;text-align:center;}
.mo.done{background:#eaf1e9;border-color:#cfe0cd;}
.mo-m{display:block;font-family:ui-monospace,monospace;font-size:12px;color:var(--muted);letter-spacing:.06em;}
.mo-v{display:block;font-size:13px;font-weight:700;margin-top:3px;}
.mo.done .mo-v{color:var(--ok);}

.controls{display:flex;gap:10px;padding:12px 16px;flex-wrap:wrap;align-items:center;}
.search{flex:1;min-width:180px;display:flex;align-items:center;gap:8px;background:var(--paper);border:1px solid var(--line);border-radius:9px;padding:0 10px;color:var(--muted);}
.search input{flex:1;border:none;background:none;padding:10px 0;font-size:14px;color:var(--text);outline:none;font-family:inherit;}
.search .clear{border:none;background:none;color:var(--muted);cursor:pointer;display:flex;padding:2px;}
.seg{display:flex;background:var(--paper);border:1px solid var(--line);border-radius:9px;padding:3px;gap:2px;}
.seg button{border:none;background:none;padding:7px 12px;font-size:12.5px;color:var(--muted);cursor:pointer;border-radius:6px;font-family:inherit;white-space:nowrap;}
.seg button.on{background:var(--ink);color:#f3efe2;font-weight:600;}

.cats{display:flex;gap:7px;padding:4px 16px 14px;overflow-x:auto;}
.cats button{flex:0 0 auto;border:1px solid var(--line);background:var(--paper);padding:7px 12px;border-radius:20px;font-size:12.5px;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:7px;font-family:inherit;transition:all .15s;}
.cats button:hover{border-color:#b9ab8a;}
.cats button.on{background:var(--ink);color:#f3efe2;border-color:var(--ink);}
.cn{font-family:ui-monospace,monospace;font-size:11px;opacity:.6;}
.cats button.on .cn{color:var(--accent);opacity:1;}

.list{padding:0 16px;}
.grp{margin-bottom:20px;}
.grp-hd{display:flex;align-items:center;gap:10px;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:700;padding:6px 2px;border-bottom:1.5px solid var(--ink);margin-bottom:10px;}
.grp-n{font-family:ui-monospace,monospace;color:var(--accent2);}
.grp-ct{margin-left:auto;font-family:ui-monospace,monospace;letter-spacing:0;color:var(--ink);}

.card{display:flex;gap:12px;background:var(--paper2);border:1px solid var(--line);border-radius:12px;padding:13px 14px;margin-bottom:9px;transition:opacity .2s,background .2s;}
.card.owned{background:#f1f4ee;opacity:.72;}
.card.owned .nm{text-decoration:line-through;text-decoration-color:var(--muted);}
.tick{flex:0 0 auto;width:26px;height:26px;border-radius:8px;border:2px solid #c3b995;background:var(--paper);cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;margin-top:2px;transition:all .15s;padding:0;}
.tick:hover{border-color:var(--ok);}
.tick.on{background:var(--ok);border-color:var(--ok);}
.tick svg{opacity:0;}
.tick.on svg{opacity:1;}
.card-main{flex:1;min-width:0;}
.card-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.nm{font-weight:650;font-size:15px;letter-spacing:-.01em;}
.tag{font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:2px 7px;border-radius:20px;display:inline-flex;align-items:center;gap:3px;}
.tag.warn{background:#fbecd0;color:var(--warn);}
.tag.muted{background:#eee9dc;color:var(--muted);}
.mdl{font-size:12.5px;color:var(--muted);margin-top:3px;line-height:1.4;}
.spec{color:#9a917d;}
.why{margin-top:7px;border:none;background:none;color:var(--accent2);font-size:12px;cursor:pointer;display:flex;align-items:center;gap:4px;padding:0;font-family:inherit;font-weight:600;}
.chev{transition:transform .2s;}
.why.open .chev{transform:rotate(180deg);}
.note{margin-top:8px;font-size:12.5px;line-height:1.55;color:#4a4636;background:#f3eede;border-left:2px solid var(--accent);padding:9px 11px;border-radius:0 7px 7px 0;display:none;}
.note.open{display:block;}
.card-right{flex:0 0 auto;display:flex;flex-direction:column;align-items:flex-end;gap:7px;min-width:118px;}
.fields{display:flex;gap:6px;}
.fld{display:flex;flex-direction:column;gap:2px;}
.fld span{font-size:9px;color:var(--muted);text-align:center;letter-spacing:.05em;text-transform:uppercase;}
.fld input{width:44px;padding:5px 4px;border:1px solid var(--line);border-radius:7px;text-align:center;font-size:13px;font-family:ui-monospace,monospace;background:var(--paper);color:var(--text);outline:none;}
.fld.price input{width:58px;}
.fld input:focus{border-color:var(--accent);}
.sub-row{display:flex;align-items:center;gap:8px;}
.mo-badge{font-family:ui-monospace,monospace;font-size:11px;background:#eee9dc;color:var(--muted);padding:2px 7px;border-radius:6px;letter-spacing:.03em;}
.line-total{font-weight:700;font-size:14px;font-family:ui-monospace,monospace;}
.del{border:none;background:none;color:#b9ab8a;cursor:pointer;padding:2px;display:flex;transition:color .15s;}
.del:hover{color:var(--danger);}
.del-confirm{display:flex;gap:5px;}
.del-yes{border:none;background:var(--danger);color:#fff;font-size:11px;padding:5px 9px;border-radius:6px;cursor:pointer;font-family:inherit;font-weight:600;}
.del-no{border:1px solid var(--line);background:none;color:var(--muted);font-size:11px;padding:5px 9px;border-radius:6px;cursor:pointer;font-family:inherit;}

.empty{padding:34px 16px;text-align:center;color:var(--muted);font-size:14px;}
.link{border:none;background:none;color:var(--accent2);cursor:pointer;font:inherit;text-decoration:underline;padding:0;}

.footer-actions{padding:8px 16px 0;display:flex;flex-direction:column;gap:12px;}
.btn{border:1px solid var(--line);background:var(--paper);padding:10px 16px;border-radius:9px;font-size:13.5px;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:7px;color:var(--text);transition:all .15s;}
.btn:hover{border-color:#b9ab8a;}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;}
.btn.primary:hover{background:var(--accent2);}
.btn.ghost{background:none;color:var(--muted);}
.btn.danger{background:var(--danger);border-color:var(--danger);color:#fff;font-weight:600;}
.add-open{width:100%;justify-content:center;border-style:dashed;}
.tools{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.tools .btn{font-size:12px;padding:7px 12px;}
.add-panel{background:var(--paper2);border:1px solid var(--line);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:10px;}
.add-row{display:flex;gap:8px;flex-wrap:wrap;}
.add-panel input,.add-panel select,.add-panel textarea{padding:9px 11px;border:1px solid var(--line);border-radius:8px;font-size:13.5px;font-family:inherit;background:var(--paper);color:var(--text);outline:none;}
.add-panel input:focus,.add-panel select:focus,.add-panel textarea:focus{border-color:var(--accent);}
.add-name{flex:1;min-width:150px;}
.add-model{flex:1;min-width:150px;}
.add-num{width:78px;}
.add-btns{display:flex;gap:8px;}
.reset-confirm{display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-size:13px;color:var(--muted);}
.disclaimer{text-align:center;font-size:11.5px;color:var(--muted);padding:16px 24px 40px;line-height:1.5;}

/* ===== ORG ===== */
.oview{padding:6px 16px 0;}
.ogroup{margin-bottom:18px;}
.ogroup-hd{display:flex;align-items:center;gap:10px;padding:6px 2px 8px;border-bottom:1.5px solid var(--ink);margin-bottom:6px;}
.ogroup-hd .gi{font-family:ui-monospace,monospace;color:var(--accent2);font-size:12px;}
.ogroup-hd .gt{font-size:13px;letter-spacing:.06em;text-transform:uppercase;font-weight:700;color:var(--ink);}
.ogroup-hd .gc{margin-left:auto;font-family:ui-monospace,monospace;font-size:12px;color:var(--muted);}
.ogroup .prog{margin:0 2px 12px;}
.otarget{display:flex;gap:11px;background:var(--paper2);border:1px solid var(--line);border-radius:11px;padding:12px 13px;margin-bottom:8px;transition:opacity .2s,background .2s;}
.otarget.done{background:#f1f4ee;opacity:.7;}
.otarget.done .ot-title{text-decoration:line-through;text-decoration-color:var(--muted);}
.ot-main{flex:1;min-width:0;}
.ot-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.ot-title{font-weight:650;font-size:14.5px;}
.ot-detail{font-size:12.5px;color:var(--muted);margin-top:5px;line-height:1.5;}
.ot-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex:0 0 auto;}

/* ===== MAP ===== */
.mstats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);border-top:1px solid var(--line);border-bottom:1px solid var(--line);margin:14px 0 0;}
.rmap{padding:16px 16px 4px;}
.legend{display:flex;flex-wrap:wrap;gap:7px;padding:0 18px 12px;}
.pill{font-size:10.5px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;padding:3px 8px;border-radius:20px;display:inline-flex;align-items:center;gap:4px;}
.pill.camping{background:#e3efe0;color:#3a6b45;}
.pill.agua{background:#dcebf2;color:var(--water);}
.pill.serv{background:#efe9dc;color:#7a6a3f;}
.pill.front{background:#e5e2f0;color:#5a4f8a;}
.pill.perigo{background:#f6ddd8;color:var(--danger);}
.pill.destino{background:#fbe9cf;color:var(--accent2);}
.pill.atrativo{background:#e9e4f0;color:#6a4f8a;}
.stop{position:relative;padding:0 0 4px 34px;}
.stop:before{content:"";position:absolute;left:11px;top:22px;bottom:-6px;width:3px;background:var(--line);}
.stop:last-child:before{display:none;}
.stop.leg-danger:before{background:repeating-linear-gradient(180deg,var(--danger) 0 7px,transparent 7px 13px);}
.node{position:absolute;left:4px;top:6px;width:18px;height:18px;border-radius:50%;background:var(--paper2);border:3px solid var(--ink);z-index:1;}
.stop.first .node{border-color:var(--accent2);background:var(--accent);}
.stop.last .node{border-color:var(--accent2);background:#fff;}
.stop-card{background:var(--paper2);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:10px;cursor:pointer;transition:border-color .15s;}
.stop-card:hover{border-color:#b9ab8a;}
.stop-card.open{border-color:var(--accent);}
.stop-hd{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;}
.stop-name{font-weight:700;font-size:15px;}
.stop-km{font-family:ui-monospace,monospace;font-size:12px;color:var(--muted);margin-left:auto;}
.stop-leg{font-family:ui-monospace,monospace;font-size:11px;color:#9a917d;}
.stop-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
.stop-note{font-size:12.5px;line-height:1.55;color:#4a4636;margin-top:10px;padding-top:10px;border-top:1px dashed var(--line);display:none;}
.stop-card.open .stop-note{display:block;}
.stop-note.danger{color:var(--danger);font-weight:500;}
.poi-sec{padding:8px 16px 0;}
.poi-sec h3{font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink);border-bottom:1.5px solid var(--ink);padding-bottom:8px;margin:8px 2px 12px;}
.poi{display:flex;gap:10px;align-items:flex-start;background:var(--paper2);border:1px solid var(--line);border-radius:11px;padding:11px 13px;margin-bottom:8px;}
.poi-main{flex:1;min-width:0;}
.poi-name{font-weight:650;font-size:14px;}
.poi-note{font-size:12.5px;color:var(--muted);margin-top:3px;line-height:1.45;}

@media (max-width:620px){
  .stats,.mstats{grid-template-columns:repeat(2,1fr);}
  .mstats{grid-template-columns:repeat(3,1fr);}
  .months{grid-template-columns:repeat(3,1fr);}
  .card{flex-wrap:wrap;}
  .card-right{width:100%;min-width:0;flex-direction:row;justify-content:space-between;align-items:center;border-top:1px dashed var(--line);padding-top:10px;margin-top:2px;}
  .tab{font-size:12px;padding:12px 4px;}
}
@media (prefers-reduced-motion:reduce){*{transition:none!important;}}
button:focus-visible,input:focus-visible,select:focus-visible{outline:2px solid var(--accent);outline-offset:1px;}
</style>
</head>

<script>

const GEAR_KEY="expedicao_gear_v2", ORG_KEY="expedicao_org_v1", POI_KEY="expedicao_poi_v1";
const CATS=[

];
const MONTHS=["Jul","Ago","Set","Out","Nov","Dez"];

const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

const GEAR_RAW=[
["carga","Rack traseiro","Ibera PakRak IB-RA5 (disc)","Suporta 25kg, alumínio",1,"Jul",320,false,"Base de toda a capacidade de carga. A versão disc libera o cáliper do freio. 25kg cobre folgado sua carga real (~15–18kg).",true],

["carga","Bolsa de selim","Média","~1L, kit reparo",1,"Set",90,false,"Isola o kit de reparo — redundância se um alforje molhar ou sumir.",false],
["dormida","Barraca","Naturehike Cloud Up 2","2P, coluna 3000mm+, ~1,5kg",1,"Set",900,false,"2P para 1 ciclista = espaço p/ bagagem. Fator crítico na costa é o vento: bons estais. Monte 2–3x em casa antes.",false],
["dormida","Saco de dormir","Nautika Viper (sintético)","Conforto 8–10°C",1,"Out",350,false,"Sintético e não pluma: o ar salino/úmido da costa destrói a pluma molhada. Sintético isola úmido e seca rápido.",false],
["dormida","Isolante térmico","Naturehike inflável (R~2)","R-value ~2, 400–600g",1,"Out",300,false,"O frio que rouba calor vem do chão. R2 sobra p/ verão. Kit de reparo incluso p/ o risco de furo.",false],
["dormida","Travesseiro inflável","Naturehike / Trekology","~60g",1,"Out",100,false,"Sono ruim por 6 dias vira fadiga acumulada. Alternativa R$0 é saco com roupas.",false],
["cozinha","Fogareiro","Fire Maple FMS-300T","Gás isobutano ~60g",1,"Nov",180,false,"Gás é rápido, mas cartucho pode faltar no Rocha. Compre com antecedência. Álcool é o backup.",false],
["cozinha","Cartucho de gás","Isobutano 230g","230g",2,"Dez",55,false,"Leve 2 pela dificuldade de reposição. Não vai em transporte pressurizado — compra local.",false],

function lsGet(k){try{const r=localStorage.getItem(k);return r?JSON.parse(r):null;}catch(e){return null;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function loadArr(key,seedFn){const a=lsGet(key);if(Array.isArray(a)&&a.length)return a.map(x=>({...x,id:x.id||uid()}));const s=seedFn();lsSet(key,s);return s;}

 return{totalCount:real.length,ownedCount,pct:real.length?ownedCount/real.length:0,

}

  <div class="stat"><span class="stat-k">Itens adquiridos</span><span class="stat-v">${t.ownedCount}<span class="frac">/${t.totalCount}</span></span></div>`;
 const ms=MONTHS.map(m=>({m,val:state.items.filter(i=>!i.owned&&i.month===m).reduce((s,i)=>s+i.price*i.qty,0)}));

 document.getElementById("routeFill").style.width=(t.pct*100)+"%";
 document.getElementById("rider").style.left=(t.pct*100)+"%";
 document.getElementById("wps").innerHTML=WAYPOINTS.map((w,i)=>{const p=i/(WAYPOINTS.length-1);return `<div class="wp${p<=t.pct?" on":""}" style="left:${p*100}%" title="${esc(w)}"></div>`;}).join("");
 const wpIdx=Math.min(WAYPOINTS.length-1,Math.round(t.pct*(WAYPOINTS.length-1)));

function gearFiltered(){
 const q=state.query.trim().toLowerCase();
 return state.items.filter(i=>{
  if(state.cat!=="all"&&i.category!==state.cat)return false;
  if(state.status==="buy"&&i.owned)return false;
  if(state.status==="have"&&!i.owned)return false;
  if(q&&!(i.name.toLowerCase().includes(q)||(i.model||"").toLowerCase().includes(q)))return false;
  return true;
 });
}

  <div class="card-main">
   <div class="card-top"><span class="nm">${esc(it.name)}</span>${it.verify&&!it.owned?`<span class="tag warn">${ICON.warn} verificar</span>`:""}${it.qty===0?`<span class="tag muted">opcional</span>`:""}</div>
   <div class="mdl">${esc(it.model)}${it.spec&&it.spec!=="—"?`<span class="spec"> · ${esc(it.spec)}</span>`:""}</div>
   ${it.notes?`<button class="why" data-action="why" data-id="${it.id}">${ICON.chev} por que levar</button><div class="note" data-note="${it.id}">${esc(it.notes)}</div>`:""}
  </div>
  <div class="card-right">
   <div class="fields">
    <label class="fld"><span>qtd</span><input type="number" min="0" inputmode="numeric" value="${it.qty}" data-field="qty" data-id="${it.id}"></label>
    <label class="fld price"><span>R$/un</span><input type="number" min="0" inputmode="numeric" value="${it.price}" data-field="price" data-id="${it.id}"></label>
   </div>
   <div class="sub-row"><span class="mo-badge">${esc(it.month)}</span><span class="line-total">${brl(it.price*it.qty)}</span></div>
   ${state.confirmDel===it.id?`<div class="del-confirm"><button class="del-yes" data-action="gdel-yes" data-id="${it.id}">remover</button><button class="del-no" data-action="gdel-no">cancelar</button></div>`:`<button class="del" data-action="gdel" data-id="${it.id}" aria-label="Remover">${ICON.trash}</button>`}
  </div></div>`;
}
function gearList(){
 const items=gearFiltered(), el=document.getElementById("list");
 if(!items.length){el.innerHTML=`<div class="empty">Nada com esse filtro. <button class="link" data-action="clear-filters">Limpar filtros</button>.</div>`;return;}
 const groups=CATS.map(c=>({c,list:items.filter(i=>i.category===c.id)})).filter(g=>g.list.length);
 el.innerHTML=groups.map(({c,list})=>`<div class="grp"><div class="grp-hd"><span class="grp-n">${c.n}</span>${c.label}<span class="grp-ct">${list.filter(i=>i.owned).length}/${list.length}</span></div>${list.map(gearCard).join("")}</div>`).join("");
}
function gearFooter(){
 const add=state.adding?`<div class="add-panel">
   <div class="add-row"><input class="add-name" id="d-name" placeholder="Nome do item"><input class="add-model" id="d-model" placeholder="Modelo (opcional)"></div>
   <div class="add-row"><select id="d-cat">${CATS.map(c=>`<option value="${c.id}">${c.label}</option>`).join("")}</select><select id="d-month">${MONTHS.map(m=>`<option value="${m}">${m}</option>`).join("")}</select><input class="add-num" id="d-qty" type="number" min="0" placeholder="qtd" value="1"><input class="add-num" id="d-price" type="number" min="0" placeholder="R$"></div>
   <div class="add-btns"><button class="btn primary" data-action="add-save">${ICON.plus} Adicionar</button><button class="btn ghost" data-action="add-cancel">Cancelar</button></div>
  </div>`:`<button class="btn add-open" data-action="add-open">${ICON.plus} Adicionar item</button>`;
 const reset=state.confirmReset?`<div class="reset-confirm"><span>Restaurar a lista de equipamento original?</span><button class="btn danger" data-action="greset-yes">Restaurar</button><button class="btn ghost" data-action="greset-no">Não</button></div>`:`<button class="btn ghost" data-action="greset-open">${ICON.reset} Restaurar equipamento</button>`;
 document.getElementById("footer").innerHTML=`${add}<div class="tools"><button class="btn" data-action="export">${ICON.down} Exportar backup</button><button class="btn" data-action="import">${ICON.up} Importar backup</button></div>${reset}`;
}

/* ---------- ORG ---------- */
function renderOrg(){
 const done=state.targets.filter(t=>t.done).length, tot=state.targets.length;
 document.getElementById("view").innerHTML=`
  <div class="view-hero">
   <h2>Organização & Treino</h2>
   <p>As frentes que te levam pronto até a largada. O treino físico é tão parte do equipamento quanto a barraca — corpo despreparado não se compra em dezembro.</p>
   <div class="prog"><i style="width:${tot?done/tot*100:0}%"></i></div>
   <p style="margin-top:6px"><b>${done}/${tot}</b> metas concluídas · prontidão organizacional <b>${tot?Math.round(done/tot*100):0}%</b></p>
  </div>
  <div class="oview" id="oview"></div>
  <div class="footer-actions" id="ofooter"></div>
  <p class="disclaimer">Cada meta abre o "por quê". Adicione as suas — cada expedição tem detalhes próprios.</p>`;
 orgList();orgFooter();
}
function orgList(){
 const el=document.getElementById("oview");
 el.innerHTML=ORG_GROUPS.map(g=>{
  const list=state.targets.filter(t=>t.group===g.id);
  if(!list.length)return "";
  const done=list.filter(t=>t.done).length;
  return `<div class="ogroup"><div class="ogroup-hd"><span class="gi">${g.n}</span><span class="gt">${g.label}</span><span class="gc">${done}/${list.length}</span></div>
   <div class="prog"><i style="width:${done/list.length*100}%"></i></div>
   ${list.map(orgCard).join("")}</div>`;
 }).join("");
}
function orgCard(t){
 return `<div class="otarget${t.done?" done":""}">
  <button class="tick${t.done?" on":""}" data-action="otoggle" data-id="${t.id}" aria-label="Concluir meta">${ICON.check}</button>
  <div class="ot-main">
   <div class="ot-top"><span class="ot-title">${esc(t.title)}</span><span class="mo-badge">${esc(t.deadline)}</span></div>
   ${t.detail?`<div class="ot-detail">${esc(t.detail)}</div>`:""}
  </div>
  <div class="ot-right">
   ${state.orgDel===t.id?`<div class="del-confirm"><button class="del-yes" data-action="odel-yes" data-id="${t.id}">remover</button><button class="del-no" data-action="odel-no">x</button></div>`:`<button class="del" data-action="odel" data-id="${t.id}" aria-label="Remover">${ICON.trash}</button>`}
  </div></div>`;
}
function orgFooter(){
 const add=state.orgAdding?`<div class="add-panel">
   <input class="add-name" id="o-title" placeholder="Nova meta">
   <textarea id="o-detail" rows="2" placeholder="Por que importa (opcional)"></textarea>
   <div class="add-row"><select id="o-group">${ORG_GROUPS.map(g=>`<option value="${g.id}">${g.label}</option>`).join("")}</select><select id="o-deadline">${MONTHS.concat(["Jan"]).map(m=>`<option value="${m}">${m}</option>`).join("")}</select></div>
   <div class="add-btns"><button class="btn primary" data-action="oadd-save">${ICON.plus} Adicionar meta</button><button class="btn ghost" data-action="oadd-cancel">Cancelar</button></div>
  </div>`:`<button class="btn add-open" data-action="oadd-open">${ICON.plus} Adicionar meta</button>`;
 document.getElementById("ofooter").innerHTML=add;
}

/* ---------- MAP ---------- */
function renderMap(){
 const total=STOPS[STOPS.length-1].km, days=6, avg=Math.round(total/days);
 document.getElementById("view").innerHTML=`
  <div class="view-hero">
   <h2>Mapa de trecho & pontos de interesse</h2>
   <p>Visão estratégica da rota. A navegação de verdade na estrada é do OsmAnd/Maps.me (offline) — este mapa te mostra o quadro geral: distâncias, onde há serviço e, principalmente, <b>onde não há</b>.</p>
  </div>
  <section class="mstats">
   <div class="stat"><span class="stat-k">Distância total (aprox.)</span><span class="stat-v">${total} km</span></div>
   <div class="stat"><span class="stat-k">Dias (piso)</span><span class="stat-v">${days}</span></div>
   <div class="stat"><span class="stat-k">Média/dia</span><span class="stat-v">${avg} km</span></div>
  </section>
  <div class="legend">
   <span class="pill camping">camping</span><span class="pill agua">água</span><span class="pill serv">serviços</span><span class="pill front">fronteira</span><span class="pill perigo">sem serviços</span><span class="pill destino">destino</span>
  </div>
  <div class="rmap">${STOPS.map(stopHTML).join("")}</div>
  <div class="poi-sec"><h3>Meus pontos de interesse</h3><div id="poilist"></div><div class="footer-actions" id="pfooter"></div></div>
  <p class="disclaimer">Distâncias são aproximadas para planejamento — confirme na sua ferramenta de rota. Adicione seus pontos: campings reservados, lojas de bike, contatos.</p>`;
 poiList();poiFooter();
}
function stopHTML(s,i){
 const cls=(i===0?"first":i===STOPS.length-1?"last":"")+(s.danger?" leg-danger":"");
 const open=state.openStop===i;
 return `<div class="stop ${cls}"><div class="node"></div>
  <div class="stop-card${open?" open":""}" data-action="stop" data-i="${i}">
   <div class="stop-hd"><span class="stop-name">${esc(s.name)}</span><span class="stop-km">${s.km} km <span class="stop-leg">(${esc(s.leg)})</span></span></div>
   <div class="stop-tags">${s.tags.map(t=>`<span class="pill ${t}">${TAGLABEL[t]||t}</span>`).join("")}</div>
   <div class="stop-note${s.danger?" danger":""}">${esc(s.note)}</div>
  </div></div>`;
}
function poiList(){
 const el=document.getElementById("poilist");
 if(!state.pois.length){el.innerHTML=`<div class="empty" style="padding:18px 4px;text-align:left">Nenhum ponto ainda. Adicione um camping reservado, uma loja de bike, um contato de emergência na rota.</div>`;return;}
 el.innerHTML=state.pois.map(p=>`<div class="poi"><div class="poi-main"><div class="poi-name">${esc(p.name)}${p.where?` <span class="stop-leg mono">· ${esc(p.where)}</span>`:""}</div>${p.note?`<div class="poi-note">${esc(p.note)}</div>`:""}</div>${state.poiDel===p.id?`<div class="del-confirm"><button class="del-yes" data-action="pdel-yes" data-id="${p.id}">remover</button><button class="del-no" data-action="pdel-no">x</button></div>`:`<button class="del" data-action="pdel" data-id="${p.id}" aria-label="Remover">${ICON.trash}</button>`}</div>`).join("");
}
function poiFooter(){
 const add=state.poiAdding?`<div class="add-panel">
   <div class="add-row"><input class="add-name" id="p-name" placeholder="Nome do ponto"><input class="add-model" id="p-where" placeholder="Onde / trecho (opcional)"></div>
   <textarea id="p-note" rows="2" placeholder="Observação (reserva, telefone, horário…)"></textarea>
   <div class="add-btns"><button class="btn primary" data-action="padd-save">${ICON.plus} Adicionar ponto</button><button class="btn ghost" data-action="padd-cancel">Cancelar</button></div>
  </div>`:`<button class="btn add-open" data-action="padd-open">${ICON.plus} Adicionar ponto</button>`;
 document.getElementById("pfooter").innerHTML=add;
}

/* ---------- export / import ---------- */
function exportData(){
 const bundle={version:3,exportedAt:new Date().toISOString(),gear:state.items,targets:state.targets,pois:state.pois};
 const blob=new Blob([JSON.stringify(bundle,null,2)],{type:"application/json"});
 const url=URL.createObjectURL(blob),a=document.createElement("a"),d=new Date().toISOString().slice(0,10);
 a.href=url;a.download=`expedicao-chui-montevideu-${d}.json`;a.click();
 setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function importData(obj){
 if(Array.isArray(obj)){state.items=normGear(obj);saveGear();}
 else if(obj&&typeof obj==="object"){
  if(Array.isArray(obj.gear)){state.items=normGear(obj.gear);saveGear();}
  if(Array.isArray(obj.targets)){state.targets=obj.targets.map(t=>({id:t.id||uid(),group:t.group||"logistica",title:t.title||"Meta",deadline:t.deadline||"Dez",detail:t.detail||"",done:!!t.done}));saveOrg();}
  if(Array.isArray(obj.pois)){state.pois=obj.pois.map(p=>({id:p.id||uid(),name:p.name||"Ponto",where:p.where||"",note:p.note||""}));savePoi();}
 } else throw 0;
 state.cat="all";state.status="all";state.query="";renderView();
}
function normGear(a){return a.map(x=>({id:x.id||uid(),category:x.category||"documentos",name:x.name||"Item",model:x.model||"—",spec:x.spec||"—",qty:Number(x.qty)||0,month:x.month||"Dez",price:Number(x.price)||0,owned:!!x.owned,notes:x.notes||"",verify:!!x.verify}));}

/* ---------- boot + events ---------- */
function app(){
 document.getElementById("app").innerHTML=shell();
 renderView();

 document.getElementById("app").addEventListener("click",e=>{
  const b=e.target.closest("[data-action]");if(!b)return;
  const a=b.dataset.action,id=b.dataset.id;
  // nav
  if(a==="view"){state.view=b.dataset.view;renderView();window.scrollTo({top:0});return;}
  // gear
  if(a==="toggle"){state.items=state.items.map(i=>i.id===id?{...i,owned:!i.owned}:i);saveGear();gearSummary();gearList();}
  else if(a==="why"){const n=document.querySelector(`[data-note="${id}"]`);if(n){n.classList.toggle("open");b.classList.toggle("open");}}
  else if(a==="gdel"){state.confirmDel=id;gearList();}
  else if(a==="gdel-yes"){state.confirmDel=null;state.items=state.items.filter(i=>i.id!==id);saveGear();gearSummary();gearList();}
  else if(a==="gdel-no"){state.confirmDel=null;gearList();}
  else if(a==="cat"){state.cat=b.dataset.cat;gearNavs();gearList();}
  else if(a==="status"){state.status=b.dataset.status;gearNavs();gearList();}
  else if(a==="clear-search"){state.query="";const s=document.getElementById("search");if(s)s.value="";const c=document.querySelector('[data-action="clear-search"]');if(c)c.style.display="none";gearList();}
  else if(a==="clear-filters"){state.cat="all";state.status="all";state.query="";const s=document.getElementById("search");if(s)s.value="";gearNavs();gearList();}
  else if(a==="add-open"){state.adding=true;gearFooter();}
  else if(a==="add-cancel"){state.adding=false;gearFooter();}
  else if(a==="add-save"){const name=v("d-name");if(!name)return;const it={id:uid(),category:v("d-cat"),name,model:v("d-model")||"—",spec:"—",qty:Math.max(0,parseInt(v("d-qty"))||1),month:v("d-month"),price:Math.max(0,parseFloat(v("d-price"))||0),owned:false,notes:"Item adicionado por você.",verify:false};state.adding=false;state.cat=it.category;state.items=[...state.items,it];saveGear();gearSummary();gearNavs();gearList();gearFooter();}
  else if(a==="greset-open"){state.confirmReset=true;gearFooter();}
  else if(a==="greset-no"){state.confirmReset=false;gearFooter();}
  else if(a==="greset-yes"){state.confirmReset=false;state.cat="all";state.status="all";state.items=seedGear();saveGear();renderGear();}
  else if(a==="export"){exportData();}
  else if(a==="import"){document.getElementById("importFile").click();}
  // org
  else if(a==="otoggle"){state.targets=state.targets.map(t=>t.id===id?{...t,done:!t.done}:t);saveOrg();renderOrg();}
  else if(a==="odel"){state.orgDel=id;orgList();}
  else if(a==="odel-yes"){state.orgDel=null;state.targets=state.targets.filter(t=>t.id!==id);saveOrg();renderOrg();}
  else if(a==="odel-no"){state.orgDel=null;orgList();}
  else if(a==="oadd-open"){state.orgAdding=true;orgFooter();}
  else if(a==="oadd-cancel"){state.orgAdding=false;orgFooter();}
  else if(a==="oadd-save"){const title=v("o-title");if(!title)return;state.targets=[...state.targets,{id:uid(),group:v("o-group"),title,deadline:v("o-deadline"),detail:v("o-detail"),done:false}];state.orgAdding=false;saveOrg();renderOrg();}
  // map / poi
  else if(a==="stop"){const i=+b.dataset.i;state.openStop=state.openStop===i?null:i;const card=b;document.querySelectorAll(".stop-card").forEach(c=>c.classList.remove("open"));if(state.openStop===i)card.classList.add("open");}
  else if(a==="pdel"){state.poiDel=id;poiList();}
  else if(a==="pdel-yes"){state.poiDel=null;state.pois=state.pois.filter(p=>p.id!==id);savePoi();poiList();}
  else if(a==="pdel-no"){state.poiDel=null;poiList();}
  else if(a==="padd-open"){state.poiAdding=true;poiFooter();}
  else if(a==="padd-cancel"){state.poiAdding=false;poiFooter();}
  else if(a==="padd-save"){const name=v("p-name");if(!name)return;state.pois=[...state.pois,{id:uid(),name,where:v("p-where"),note:v("p-note")}];state.poiAdding=false;savePoi();poiList();poiFooter();}
 });

 document.getElementById("app").addEventListener("input",e=>{
  const t=e.target;
  if(t.id==="search"){state.query=t.value;const c=document.querySelector('[data-action="clear-search"]');if(c)c.style.display=t.value?"":"none";gearList();return;}
  if(t.dataset&&t.dataset.field){
   const id=t.dataset.id,field=t.dataset.field;let val=field==="qty"?parseInt(t.value):parseFloat(t.value);if(isNaN(val)||val<0)val=0;
   state.items=state.items.map(i=>i.id===id?{...i,[field]:val}:i);saveGear();
   const card=t.closest(".card"),it=state.items.find(i=>i.id===id);
   if(card)card.querySelector(".line-total").textContent=brl(it.price*it.qty);
   gearSummary();
  }
 });

 document.getElementById("importFile").addEventListener("change",e=>{
  const file=e.target.files[0];if(!file)return;const r=new FileReader();
  r.onload=()=>{try{importData(JSON.parse(r.result));}catch(err){alert("Arquivo inválido. Selecione um backup exportado por este app.");}e.target.value="";};
  r.readAsText(file);
 });
}
function v(id){const el=document.getElementById(id);return el?el.value.trim():"";}

app();
if("serviceWorker" in navigator && location.protocol.startsWith("http")){navigator.serviceWorker.register("./sw.js").catch(()=>{});}
</script>
</body>
</html>
